<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Air Control - 4 Images</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #v { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; transform: scaleX(-1); opacity: 0.25; 
        }
        .movable-img {
            position: absolute;
            width: 200px;
            border-radius: 8px;
            transition: transform 0.1s ease;
            z-index: 10;
            filter: drop-shadow(0 5px 15px rgba(0,242,254,0.3));
            border: 2px solid transparent;
            user-select: none;
        }
        .movable-img.active {
            box-shadow: 0 0 40px #00f2fe;
            border: 2px solid #00f2fe;
            z-index: 100; /* Ushlab turganda eng tepaga chiqadi */
            transform: scale(1.1);
        }
        #status {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #00f2fe; background: rgba(0,0,0,0.85);
            padding: 12px 30px; border-radius: 50px; border: 2px solid #00f2fe;
            z-index: 1000; font-weight: bold;
        }
        #cursor {
            position: fixed; width: 12px; height: 12px; background: #fff;
            border-radius: 50%; border: 2px solid #00f2fe;
            pointer-events: none; z-index: 2000; display: none;
        }
    </style>
</head>
<body>

    <div id="status">AI yuklanmoqda... 📡</div>
    <div id="cursor"></div>
    <video id="v" playsinline></video>

    <img src="trhethw.jpg" class="movable-img" style="left: 10%; top: 20%;" onerror="imgErr(this, 'trhethw')">
    <img src="javox.jpg" class="movable-img" style="left: 35%; top: 20%;" onerror="imgErr(this, 'Javox')">
    <img src="otash.jpg" class="movable-img" style="left: 60%; top: 20%;" onerror="imgErr(this, 'Otash')">
    <img src="aziz.jpg" class="movable-img" style="left: 85%; top: 20%;" onerror="imgErr(this, 'Aziz')">

    <script>
        const video = document.getElementById('v');
        const status = document.getElementById('status');
        const cursor = document.getElementById('cursor');
        const images = document.querySelectorAll('.movable-img');

        let activeImg = null;
        let offset = { x: 0, y: 0 };
        let zIndexCounter = 100;

        function imgErr(img, name) {
            img.src = `https://via.placeholder.com/200x200?text=${name}+topilmadi`;
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8]; 
                const thumbTip = landmarks[4];

                const curX = (1 - indexTip.x) * window.innerWidth;
                const curY = indexTip.y * window.innerHeight;
                
                cursor.style.display = 'block';
                cursor.style.left = curX + 'px';
                cursor.style.top = curY + 'px';

                const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                const isPinching = distance < 0.05;

                if (isPinching) {
                    if (!activeImg) {
                        images.forEach(img => {
                            const rect = img.getBoundingClientRect();
                            if (curX > rect.left && curX < rect.right && curY > rect.top && curY < rect.bottom) {
                                activeImg = img;
                                activeImg.classList.add('active');
                                // Har safar ushlaganda z-indexni oshiramiz (eng tepaga chiqadi)
                                zIndexCounter++;
                                activeImg.style.zIndex = zIndexCounter;
                                offset.x = curX - rect.left;
                                offset.y = curY - rect.top;
                            }
                        });
                    }
                } else {
                    if (activeImg) {
                        activeImg.classList.remove('active');
                        activeImg = null;
                    }
                }

                if (activeImg) {
                    activeImg.style.left = (curX - offset.x) + 'px';
                    activeImg.style.top = (curY - offset.y) + 'px';
                    status.innerText = "Ushlab turilibdi! ✊";
                } else {
                    status.innerText = "Rasmni ushlash uchun chimchilang (Pinch) ✋";
                }
            } else {
                cursor.style.display = 'none';
                status.innerText = "Qo'lingizni ko'rsating ✋";
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
