<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Platformer Mobile</title>

<style>
body { 
    margin:0; 
    padding:0; 
    background:#000; 
    overflow:hidden; 
    touch-action:none;
    font-family: Arial;
}

canvas { 
    display:block; 
    margin:0 auto; 
    background:#0a001f; 
}

#controls { 
    position: fixed; 
    bottom: 20px; 
    left: 0; 
    right: 0; 
    display: flex; 
    justify-content: space-between; 
    padding: 0 20px; 
}

#joystick { 
    width: 120px; 
    height: 120px; 
    background: rgba(255,255,255,0.15); 
    border-radius: 50%; 
    border: 2px solid #00ff88;
    position: relative;
}

#stick {
    width: 50px;
    height: 50px;
    background: #00ff88;
    border-radius: 50%;
    position: absolute;
    left: 35px;
    top: 35px;
}

#shootBtn { 
    width: 90px; 
    height: 90px; 
    background: red; 
    color: white; 
    border: none; 
    border-radius: 50%;
    font-size: 18px;
    font-weight: bold;
}

#shootBtn:active {
    transform: scale(0.9);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
    <div id="joystick">
        <div id="stick"></div>
    </div>
    <button id="shootBtn">FIRE</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// PLAYER
let player = {
    x: 100,
    y: 300,
    w: 40,
    h: 60,
    dx: 0,
    dy: 0,
    speed: 4,
    jump: -12,
    grounded: false
};

// BULLETS
let bullets = [];

// GRAVITY
const gravity = 0.6;

// JOYSTICK
let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");

let dragging = false;
let joyX = 0;

// TOUCH CONTROLS
joystick.addEventListener("touchstart", () => dragging = true);

joystick.addEventListener("touchmove", (e) => {
    if(!dragging) return;

    let rect = joystick.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left - 60;

    joyX = x;

    // limit
    if(joyX > 40) joyX = 40;
    if(joyX < -40) joyX = -40;

    stick.style.left = (35 + joyX) + "px";
});

joystick.addEventListener("touchend", () => {
    dragging = false;
    joyX = 0;
    stick.style.left = "35px";
});

// SHOOT
document.getElementById("shootBtn").addEventListener("touchstart", () => {
    bullets.push({
        x: player.x + player.w,
        y: player.y + player.h/2,
        speed: 8
    });
});

// UPDATE
function update(){

    // movement
    player.dx = joyX * 0.1;

    player.x += player.dx;

    // gravity
    player.dy += gravity;
    player.y += player.dy;

    // ground
    if(player.y + player.h > canvas.height - 50){
        player.y = canvas.height - 50 - player.h;
        player.dy = 0;
        player.grounded = true;
    }

    // jump
    if(player.grounded && joyX < -30){
        player.dy = player.jump;
        player.grounded = false;
    }

    // bullets
    bullets.forEach(b => b.x += b.speed);

    bullets = bullets.filter(b => b.x < canvas.width);
}

// DRAW
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // player
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // ground
    ctx.fillStyle = "green";
    ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

    // bullets
    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, 10, 5);
    });
}

// GAME LOOP
function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
