<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Trap Puzzle Game FULL FIX</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

button {
  padding: 20px 40px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  margin: 10px;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<h1 id="title">🎮 LEVEL 1</h1>
<div id="game"></div>

<script>

let level = 1;
let game = document.getElementById("game");
let title = document.getElementById("title");

// ================= LOAD LEVEL =================
function loadLevel(){

  game.innerHTML = "";

  // ================= LEVEL 1 =================
  if(level === 1){
    title.innerText = "🎮 LEVEL 1";

    let text = document.createElement("h1");
    text.innerText = "👉 Tugmani top";

    let fake = document.createElement("button");
    fake.innerText = "BOS!";
    fake.style.background = "red";

    let win = document.createElement("button");
    win.innerText = "YASHIRIN";
    win.style.background = "lime";
    win.style.display = "none";

    let drag = false;

    text.onmousedown = () => drag = true;
    document.onmouseup = () => drag = false;

    document.onmousemove = (e) => {
      if(drag){
        text.style.position = "absolute";
        text.style.left = e.clientX - 100 + "px";
        text.style.top = e.clientY - 20 + "px";
        win.style.display = "block";
      }
    };

    fake.onclick = () => alert("❌ Noto‘g‘ri 😈");

    win.onclick = () => nextLevel();

    game.appendChild(text);
    game.appendChild(fake);
    game.appendChild(win);
  }

  // ================= LEVEL 2 =================
  if(level === 2){
    title.innerText = "⏳ LEVEL 2";

    let btn = document.createElement("button");
    btn.innerText = "BOSMA 😈";

    let timer = setTimeout(() => {
      alert("🎉 LEVEL 2 O'TILDI!");
      nextLevel();
    }, 4000);

    btn.onclick = () => {
      alert("💀 Aldanding!");
      clearTimeout(timer);
      loadLevel();
    };

    game.appendChild(btn);
  }

  // ================= LEVEL 3 =================
  if(level === 3){
    title.innerText = "👉 LEVEL 3";

    let text = document.createElement("h1");
    text.innerText = "👉 Raqamni top";

    let secret = document.createElement("div");
    secret.innerText = "7";
    secret.style.opacity = "0";
    secret.style.fontSize = "30px";

    let btn = document.createElement("button");
    btn.innerText = "YUTISH";

    let drag = false;
    let clicks = 0;

    text.onmousedown = () => drag = true;
    document.onmouseup = () => drag = false;

    document.onmousemove = (e) => {
      if(drag){
        text.style.position = "absolute";
        text.style.left = e.clientX - 100 + "px";
        text.style.top = e.clientY - 20 + "px";
        secret.style.opacity = "1";
      }
    };

    btn.onclick = () => {
      clicks++;
      if(clicks === 2){
        nextLevel();
      } else {
        alert("❌ Yana urin 😈");
      }
    };

    game.appendChild(text);
    game.appendChild(secret);
    game.appendChild(btn);
  }

  // ================= LEVEL 4 (🔥 NEW REAL PUZZLE) =================
  if(level === 4){
    title.innerText = "👉 LEVEL 4 - MATH TRICK";

    let q = document.createElement("h1");
    q.innerText = "👉 3 + 3 × 2 = ?";
    game.appendChild(q);

    let answers = [
      {text:"12", correct:false},
      {text:"9", correct:true},
      {text:"6", correct:false}
    ];

    answers.sort(() => Math.random() - 0.5);

    answers.forEach(a => {

      let btn = document.createElement("button");
      btn.innerText = a.text;

      btn.onclick = () => {

        if(a.correct){
          alert("🎉 LEVEL 4 O'TILDI!");
          nextLevel();
        } else {
          alert("💀 XATO! qaytadan 😈");
          loadLevel();
        }
      };

      game.appendChild(btn);
    });
  }

  // ================= LEVEL 5 =================
  if(level === 5){
    title.innerText = "👉 LEVEL 5 - FINAL TRAP";

    let order = ["red","blue","green"];
    let input = [];

    let data = [
      {color:"red", text:"Blue"},
      {color:"blue", text:"Green"},
      {color:"green", text:"Red"}
    ];

    let h = document.createElement("h1");
    h.innerText = "👉 Red → Blue → Green";

    game.appendChild(h);

    data.forEach(d => {

      let b = document.createElement("button");
      b.style.background = d.color;
      b.innerText = d.text;

      b.onclick = () => {

        input.push(d.color);

        if(input.length === 3){

          let ok = true;

          for(let i=0;i<3;i++){
            if(input[i] !== order[i]) ok = false;
          }

          if(ok){
            alert("🏆 SEN YUTDING!");
          } else {
            alert("💀 FINAL FAIL 😈");
            loadLevel();
          }

          input = [];
        }
      };

      game.appendChild(b);
    });
  }
}

// ================= NEXT LEVEL =================
function nextLevel(){
  level++;
  loadLevel();
}

loadLevel();

</script>

</body>
</html>
<link rel="stylesheet" href="style.css">
